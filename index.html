<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refined Spaces | Curated Stays · Elevated Experiences</title>
    <meta
      name="description"
      content="Premium homes providing short-term stays across Rhode Island. Refined Spaces delivers full-service property management and high-end hospitality—from the Ocean State's historic and vibrant cities to its coastal destinations."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon-180x180.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased">
    <form name="inquiry" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="inquiry" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <select name="interest">
        <option value="property-management">Property Management</option>
        <option value="hosting-questions">Hosting Questions</option>
        <option value="general">General Inquiry</option>
      </select>
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
